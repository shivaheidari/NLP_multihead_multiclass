raw_data:
  file: "data/table.csv"
  test_size: 0.1         
  val_size: 0.1 

data:
  processed_dir: "data/processed"
  train_csv: "data/processed/train.csv"
  val_csv:   "data/processed/val.csv"
  test_csv : "data/processed/test.csv"
  batch_size: 32
  max_length: 128
  label_cols:
    - label_modality
    - label_vendor
    - label_series_type
    - label_plane
    - label_acquisition
    - label_body
    - label_contrast

model:
  encoder_name: "base_models/biobert"
  
training:
  epochs: 5
  encoder_lr: 2e-5
  head_lr: 5e-5
  weight_decay: 0.01
  model_name: "finetunedweighted.bin"

paths:
  output_dir: "outputs/models/biobert_multitask"
